# Allow CORS from crank.money origins
map $http_origin $cors_origin {
    default "";
    "https://www.crank.money" $http_origin;
    "https://crank.money"     $http_origin;
    "http://localhost:3000"   $http_origin;
}

server {
    listen 80;
    server_name bot.crank.money;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bot.crank.money;

    # Managed by certbot — run: certbot --nginx -d bot.crank.money
    ssl_certificate     /etc/letsencrypt/live/bot.crank.money/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.crank.money/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # CORS headers (single source of truth — relay-server does NOT set these)
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # WebSocket relay
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # REST API
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        return 200 '{"status":"ok","service":"crank-harvester"}';
        add_header Content-Type application/json;
    }
}
